<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS TAIPEI 鍍膜保固管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --primary-blue: #2563eb; 
            --deep-navy: #1e3a8a; 
            --titanium-slate: #475569;
        }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* 行動裝置響應式表格折疊 */
        @media (max-width: 768px) {
            .responsive-table thead { display: none; }
            .responsive-table tr { display: block; border-bottom: 8px solid #e2e8f0; padding: 15px 0; }
            .responsive-table td { display: block; width: 100%; text-align: left !important; padding: 10px 20px !important; border: none !important; }
            .responsive-table td:last-child { border-top: 1px solid #e2e8f0; margin-top: 10px; }
        }

        .print-only { display: none; }
        
        /* 列印模式下的版面配置調校 */
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            body { background-color: white !important; margin: 0; padding: 0; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .no-print { display: none !important; }
            .print-only { display: block; }
            
            .print-header { flex-direction: row !important; align-items: center !important; }
            .print-footer { flex-direction: row !important; align-items: flex-end !important; }
            .grid-cols-3 { display: grid !important; grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
            
            .print-container { 
                width: 100% !important; 
                max-width: 190mm !important; 
                padding: 0 !important; 
                margin: 0 auto !important; 
                border: none !important; 
                box-shadow: none !important;
                background-color: white !important;
                page-break-inside: avoid;
            }
            
            .print-report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            .print-report-table th, .print-report-table td { border: 1px solid #cbd5e1; padding: 10px 8px; text-align: left; font-size: 11px; line-height: 1.4; }
            .print-report-table th { background-color: #f1f5f9 !important; color: #1e293b !important; -webkit-print-color-adjust: exact; }
            .page-break { page-break-after: always; }
            .bg-blue-600 { background-color: #2563eb !important; -webkit-print-color-adjust: exact; }
        }

        .quote-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 8rem;
            font-weight: 900;
            color: rgba(37, 99, 235, 0.02);
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
        }
    </style>
</head>
<body class="min-h-screen">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 豪華車輛品牌與熱門型號預設資料庫
        const CAR_DATABASE = {
            "Porsche 保時捷": ["911", "Taycan", "Cayenne", "Macan", "718", "Panamera"],
            "BMW": ["M2/M3/M4", "M5/M8", "X5/X6/X7", "3/5/7 Series", "iX/i4/i7"],
            "Mercedes-Benz": ["G-Class", "AMG GT", "S-Class", "E-Class", "C-Class", "GLE/GLC"],
            "Tesla 特斯拉": ["Model S", "Model X", "Model 3", "Model Y"],
            "Audi 奧迪": ["RS6/RS7", "e-tron GT", "R8", "Q7/Q8", "A4/A5/A6"],
            "Lexus 凌志": ["RX Series", "NX Series", "LM Series", "ES Series", "LC/LS"],
            "Toyota": ["Alphard/Vellfire", "Crown", "RAV4", "GR Yaris/Supra", "Sienna"],
            "Ferrari 法拉利": ["296 GTB", "SF90", "Purosangue", "F8/Roma", "812"],
            "Lamborghini 藍寶堅尼": ["Urus", "Revuelto", "Huracán", "Aventador"],
            "McLaren 麥拉倫": ["750S/720S", "Artura", "GT", "765LT"],
            "Aston Martin": ["DBX", "Vantage", "DB12/DB11"],
            "Bentley 賓利": ["Continental GT", "Bentayga", "Flying Spur"],
            "Rolls-Royce 勞斯萊斯": ["Cullinan", "Ghost", "Phantom", "Spectre"],
            "Maserati 瑪莎拉蒂": ["Grecale", "Levante", "MC20", "Ghibli"],
            "Land Rover": ["Range Rover", "Defender", "Discovery"],
            "Volvo": ["XC90", "XC60", "XC40", "V60/V90"],
            "Mazda": ["CX-60", "CX-5", "CX-30", "Mazda 3"],
            "Honda": ["Civic Type R", "CR-V", "HR-V", "Odyssey"],
            "其他": []
        };

        const SALES_LIST = ["Audi", "小蔡", "小楊", "其他"];

        // 專屬頂級施工服務項目
        const SERVICE_TEMPLATES = [
            "日本 AKUMA EVOLFE COAT",
            "義大利 INNOVACAR 單層",
            "義大利 INNOVACAR 雙層",
            "義大利 INNOVACAR 三層",
            "玻璃鍍膜",
            "其他"
        ];

        window.calculateWarrantyDate = (deliveryDate, serviceItems) => {
            if (!deliveryDate || !serviceItems || serviceItems.length === 0) return '無保固';
            let maxYears = 0;
            serviceItems.forEach(item => {
                const name = item.name === '其他' ? item.nameCustom : item.name;
                if (name === '日本 AKUMA EVOLFE COAT' || name === '玻璃鍍膜') {
                    maxYears = Math.max(maxYears, 1);
                } else if (
                    name === '義大利 INNOVACAR 單層' ||
                    name === '義大利 INNOVACAR 雙層' ||
                    name === '義大利 INNOVACAR 三層'
                ) {
                    maxYears = Math.max(maxYears, 2);
                }
            });
            if (maxYears === 0) return '無保固';
            
            try {
                const date = new Date(deliveryDate);
                if (isNaN(date.getTime())) return '無保固';
                date.setFullYear(date.getFullYear() + maxYears);
                return date.toISOString().split('T')[0];
            } catch (e) {
                return '無保固';
            }
        };

        window.updateWarrantyState = () => {
            const deliveryDate = document.getElementById('f-deliveryDate')?.value;
            const warrantyField = document.getElementById('f-warrantyDate');
            if (!deliveryDate || !warrantyField) return;
            
            const calculated = window.calculateWarrantyDate(deliveryDate, window.currentFormData.serviceItems);
            warrantyField.value = calculated;
            window.currentFormData.warrantyDate = calculated;
        };

        // 您的專案 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyDXutGNbW-Jqt31KhrWN1yk9RMPf9LaISE",
            authDomain: "as-coating-c0b5e.firebaseapp.com",
            projectId: "as-coating-c0b5e",
            storageBucket: "as-coating-c0b5e.firebasestorage.app",
            messagingSenderId: "484461328925",
            appId: "1:484461328925:web:e87998f97f90ce23e564f4"
        };

        let app, db, auth;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
        } catch (e) { 
            console.error("Firebase 初始化錯誤:", e); 
        }

        const appId = 'as-coating-c0b5e';
        window.workOrders = [];
        window.currentMode = 'history';
        window.currentFormData = {};
        window.currentFilterMonth = new Date().toISOString().slice(0, 7);

        const startAuth = async () => {
            const statusEl = document.getElementById('online-status');
            try {
                let userCredential = null;
                // 自動捕捉專案 Token 衝突，並直接轉切匿名登入
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        userCredential = await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (tokenErr) {
                        console.warn("環境憑證不匹配，自動切換至安全匿名登入:", tokenErr);
                        userCredential = await signInAnonymously(auth);
                    }
                } else {
                    userCredential = await signInAnonymously(auth);
                }

                if (userCredential && userCredential.user) {
                    setupDatabaseListener(userCredential.user);
                } else {
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            setupDatabaseListener(user);
                        } else {
                            if (statusEl) statusEl.innerText = "● 離線模式 (尚未完成身分驗證)";
                        }
                    });
                }
            } catch (err) { 
                console.error("驗證失敗異常:", err);
                if (statusEl) {
                    statusEl.innerText = "● 離線模式 (請至 Firebase 後台啟用「匿名登入 (Anonymous)」機制)";
                    statusEl.classList.add("text-rose-500");
                }
            }
        };

        const setupDatabaseListener = (user) => {
            const statusEl = document.getElementById('online-status');
            if (statusEl) {
                statusEl.innerText = "● 雲端連線成功，正在同步數據...";
                statusEl.classList.remove("text-rose-500");
                statusEl.classList.add("text-cyan-400");
            }
            
            // 安全路徑
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'workOrders');
            
            // 即時監聽與本地端高階排序 (無需 Index)
            onSnapshot(q, (snapshot) => {
                const rawDocs = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                
                rawDocs.sort((a, b) => {
                    const dateA = a.receiveDate || '';
                    const dateB = b.receiveDate || '';
                    if (dateA !== dateB) {
                        return dateB.localeCompare(dateA); 
                    }
                    return (b.id || '').localeCompare(a.id || ''); 
                });

                window.workOrders = rawDocs;
                if (window.currentMode === 'history') window.renderHistoryMode();
                if (statusEl) statusEl.innerText = "● 雲端同步完成";
            }, (error) => { 
                console.error("Firestore 資料讀取發生錯誤:", error);
                if (statusEl) {
                    statusEl.innerText = "● 讀取失敗：請檢查 Firestore Database 安全規則權限"; 
                    statusEl.classList.add("text-rose-500");
                }
            });
        };

        window.calculateOrderTotal = (o) => {
            if (!o || !o.serviceItems) return 0;
            const subtotal = o.serviceItems.reduce((sum, item) => sum + (parseInt(item.price) || 0), 0);
            const hasTax = o.needsInvoice || o.paymentMethod === '信用卡';
            const tax = hasTax ? Math.round(subtotal * 0.05) : 0;
            return subtotal + tax;
        };

        window.showMessage = (text) => {
            const el = document.getElementById('ui-message');
            const txt = document.getElementById('ui-message-text');
            if (!el || !txt) return;
            txt.innerText = text; 
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        };

        window.handlePrint = () => { 
            window.print(); 
        };

        window.setMode = (mode, data = null, isNew = false) => {
            window.currentMode = mode;
            if (isNew) {
                const today = new Date().toISOString().split('T')[0];
                window.currentFormData = {
                    id: `AS-${new Date().toISOString().slice(2,10).replace(/-/g,'')}-${(window.workOrders.length+1).toString().padStart(3,'0')}`,
                    receiveDate: today, 
                    deliveryDate: today,
                    warrantyDate: '無保固',
                    customerName: '', 
                    customerPhone: '', 
                    licensePlate: '',
                    carBrand: 'Audi 奧迪', 
                    carBrandCustom: '', 
                    carModel: 'RS6/RS7', 
                    carModelCustom: '',
                    salesPerson: 'Audi', 
                    salesPersonCustom: '', 
                    paymentMethod: '現金', 
                    needsInvoice: false,
                    serviceItems: [{ name: '日本 AKUMA EVOLFE COAT', nameCustom: '', price: 0 }],
                    notes: ''
                };
            } else if (data) { 
                window.currentFormData = JSON.parse(JSON.stringify(data)); 
            }
            ['history', 'form', 'quote', 'printPreview'].forEach(m => {
                const el = document.getElementById(`mode-${m}`);
                if (el) el.classList.add('hidden');
            });
            if (mode === 'history') window.renderHistoryMode();
            else if (mode === 'form') window.renderFormMode();
            else if (mode === 'quote') window.renderQuoteMode();
            else if (mode === 'printPreview') window.renderPrintPreview();
            
            const target = document.getElementById(`mode-${mode}`);
            if (target) target.classList.remove('hidden');
            window.scrollTo(0,0);
        };

        window.renderPrintPreview = () => {
            const filtered = window.workOrders.filter(o => o.receiveDate && o.receiveDate.startsWith(window.currentFilterMonth));
            const monthlyRevenue = filtered.reduce((sum, o) => sum + window.calculateOrderTotal(o), 0);
            const container = document.getElementById('mode-printPreview');
            container.innerHTML = `
                <div class="no-print mb-6 flex flex-col md:flex-row justify-between items-center bg-blue-50 p-6 rounded-3xl border border-blue-200 gap-4">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-600 text-white p-2 rounded-xl">📊</div>
                        <div>
                            <p class="text-blue-950 font-black text-lg">月度營收報表預覽</p>
                            <p class="text-xs text-blue-700 font-bold">當月共有 ${filtered.length} 筆案件記錄</p>
                        </div>
                    </div>
                    <div class="flex gap-3 w-full md:w-auto">
                        <button onclick="window.setMode('history')" class="flex-1 md:flex-none bg-white border-2 border-slate-200 px-6 py-3 rounded-2xl font-bold text-slate-600 hover:bg-slate-50">返回</button>
                        <button onclick="window.handlePrint()" class="flex-1 md:flex-none bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg shadow-blue-100 hover:bg-blue-700">立即列印</button>
                    </div>
                </div>
                <div class="print-container bg-white p-8 md:p-12 shadow-2xl border mx-auto mb-10">
                    <div class="flex justify-between items-start border-b-4 border-slate-900 pb-6 mb-8 print-header">
                        <div>
                            <h1 class="text-3xl font-black tracking-tighter text-slate-950 mb-1">AS TAIPEI 月度營收明細表</h1>
                            <p class="text-slate-500 font-bold text-xs uppercase tracking-widest">Premium Paint Protection Management System</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">報表月份</p>
                            <p class="text-2xl font-black text-slate-900 leading-none">${window.currentFilterMonth}</p>
                            <p class="text-[9px] text-slate-400 mt-2 font-medium">製表日期：${new Date().toLocaleDateString()}</p>
                        </div>
                    </div>
                    <table class="print-report-table">
                        <thead>
                            <tr>
                                <th style="width: 12%">單號</th>
                                <th style="width: 12%">日期</th>
                                <th style="width: 18%">客戶資訊</th>
                                <th style="width: 18%">車輛資訊</th>
                                <th style="width: 28%">施工項目明細</th>
                                <th style="width: 12%; text-align: right;">總計(含稅)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filtered.map(o => {
                                const itemsText = o.serviceItems.map(it => `• ${it.name === '其他' ? it.nameCustom : it.name}`).join('<br>');
                                return `
                                <tr>
                                    <td class="font-bold text-[9px] md:text-xs">${o.id}</td>
                                    <td>${o.receiveDate}</td>
                                    <td class="font-bold">${o.customerName}<br><span class="text-[9px] font-normal text-slate-500">${o.customerPhone}</span></td>
                                    <td class="font-black">${o.licensePlate}<br><span class="text-[9px] font-normal text-slate-500">${o.carBrand}</span><br>${o.warrantyDate && o.warrantyDate !== '無保固' ? `<span class="text-[9px] text-emerald-600 font-bold">🛡️ 保固至 ${o.warrantyDate}</span>` : '<span class="text-[9px] text-slate-400 font-medium">無保固</span>'}</td>
                                    <td class="text-[10px]">${itemsText}</td>
                                    <td class="text-right font-black">NT$ ${window.calculateOrderTotal(o).toLocaleString()}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                        <tfoot>
                            <tr style="background-color: #f8fafc;">
                                <td colspan="5" style="text-align: right; font-weight: 900; font-size: 13px; padding: 15px;">本月合計營收額</td>
                                <td style="text-align: right; font-weight: 900; font-size: 16px; color: #1d4ed8; padding: 15px;">NT$ ${monthlyRevenue.toLocaleString()}</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            `;
        };

        window.renderQuoteMode = () => {
            const d = window.currentFormData;
            const container = document.getElementById('mode-quote');
            const subtotal = d.serviceItems.reduce((s, i) => s + (parseInt(i.price)||0), 0);
            const hasTax = d.needsInvoice || d.paymentMethod === '信用卡';
            const tax = hasTax ? Math.round(subtotal * 0.05) : 0;
            const total = subtotal + tax;

            const brandDisplay = d.carBrand === '其他' ? d.carBrandCustom : d.carBrand;
            const modelDisplay = d.carModel === '其他' ? d.carModelCustom : d.carModel;
            const salesDisplay = d.salesPerson === '其他' ? d.salesPersonCustom : d.salesPerson;

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <div class="lg:col-span-3 bg-white p-6 md:p-12 rounded-[3rem] shadow-2xl border-t-[16px] border-blue-600 print-container relative overflow-hidden">
                        <div class="quote-watermark">AS TAIPEI</div>
                        
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b-2 border-slate-100 pb-8 mb-10 gap-6 relative z-10 print-header">
                            <div>
                                <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter">AS TAIPEI</h1>
                                <p class="text-[11px] font-black text-blue-600 mt-2 uppercase tracking-[0.2em]">Premium Paint Protection Film Specialist</p>
                                <p class="text-[10px] text-slate-400 mt-1 font-bold">台北市內湖區民權東路六段15巷35號1樓 | 02-2790-9077</p>
                            </div>
                            <div class="bg-blue-50/50 p-6 rounded-3xl border-2 border-blue-100 text-right">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">施工服務工單 / 保價單</p>
                                <p class="text-2xl font-black text-blue-900 font-mono tracking-tighter">${d.id}</p>
                                <p class="text-[10px] text-slate-400 mt-2">建立日期：${new Date().toLocaleDateString()}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-y-10 gap-x-6 mb-10 p-10 bg-slate-50/50 rounded-[2.5rem] border border-slate-100 relative z-10">
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">客戶姓名</p>
                                <p class="font-black text-lg text-slate-900">${d.customerName || '-'}</p>
                            </div>
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">聯絡電話</p>
                                <p class="font-black text-lg text-slate-900">${d.customerPhone || '-'}</p>
                            </div>
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">施工車輛</p>
                                <div class="flex items-center gap-3">
                                    <p class="font-black text-lg text-slate-900">${brandDisplay} ${modelDisplay}</p>
                                    <span class="bg-blue-900 text-white px-2 py-1 rounded-lg text-[11px] font-mono font-black uppercase tracking-wider">${d.licensePlate || 'N/A'}</span>
                                </div>
                            </div>
                            
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">接待人員</p>
                                <p class="font-black text-lg text-slate-800">${salesDisplay}</p>
                            </div>
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">接車 / 交車日期</p>
                                <p class="font-black text-base text-slate-800 whitespace-nowrap">${d.receiveDate} <span class="text-slate-300 mx-1 text-sm">→</span> <span class="text-blue-600">${d.deliveryDate}</span></p>
                            </div>
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">付款方式</p>
                                <p class="font-black text-lg text-slate-800">${d.paymentMethod} <span class="text-[10px] font-bold text-slate-400">${hasTax?'(含稅 5%)':''}</span></p>
                            </div>

                            <div class="col-span-3 border-t border-dashed border-slate-200 pt-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">🛡️ 鍍膜保固效期 (Warranty Period)</p>
                                    <p class="text-lg font-black text-slate-900">${d.warrantyDate && d.warrantyDate !== '無保固' ? `${d.warrantyDate} (自交車日起算)` : '本案施工項目不提供保固'}</p>
                                </div>
                                ${d.warrantyDate && d.warrantyDate !== '無保固' ? `<span class="bg-emerald-50 text-emerald-700 border border-emerald-200 px-4 py-2 rounded-full text-xs font-black">尊榮保固有效中</span>` : ''}
                            </div>
                        </div>

                        ${d.notes && d.notes.trim() !== '' ? `

        };

        window.renderItems = () => { 
            document.getElementById('items-container').innerHTML = window.currentFormData.serviceItems.map((it, i) => `
                <div class="flex flex-col md:flex-row gap-4 bg-white p-4 rounded-2xl border shadow-sm relative">
                    <div class="flex-grow space-y-2">
                        <select onchange="window.toggleItemCustom(${i}, this.value)" class="w-full p-4 bg-slate-50 border rounded-xl font-bold appearance-none">
                            ${SERVICE_TEMPLATES.map(t => `<option value="${t}" ${it.name===t?'selected':''}>${t}</option>`).join('')}
                        </select>
                        <input type="text" id="it-custom-${i}" value="${it.nameCustom||''}" placeholder="手寫輸入服務項目" oninput="window.updItem(${i}, 'nameCustom', this.value)" class="w-full p-4 bg-blue-50 border-blue-100 border rounded-xl font-bold ${it.name==='其他'?'':'hidden'}">
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-bold text-slate-400">NT$</span>
                        <input type="number" value="${it.price}" placeholder="金額" oninput="window.updItem(${i}, 'price', this.value)" class="flex-grow md:w-40 p-4 bg-slate-50 border rounded-xl font-black text-right text-blue-600">
                        <button onclick="window.removeItem(${i})" class="text-slate-300 hover:text-rose-500 p-2 text-2xl">✕</button>
                    </div>
                </div>
            `).join(''); 
        };

        window.toggleItemCustom = (i, val) => { window.currentFormData.serviceItems[i].name = val; window.renderItems(); window.updateWarrantyState(); };
        window.updItem = (i, k, v) => { window.currentFormData.serviceItems[i][k] = (k==='price' ? parseInt(v)||0 : v); if (k === 'nameCustom') window.updateWarrantyState(); };
        window.addItem = () => { window.currentFormData.serviceItems.push({name:'其他', nameCustom:'', price:0}); window.renderItems(); window.updateWarrantyState(); };
        window.removeItem = (i) => { window.currentFormData.serviceItems.splice(i,1); window.renderItems(); window.updateWarrantyState(); };

        window.saveToCloud = async (orderData) => {
            if (!auth || !auth.currentUser) { 
                window.showMessage("無法儲存：雲端尚未連線。請確認後台設定。"); 
                return; 
            }
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'workOrders', orderData.id);
            try { 
                await setDoc(docRef, { ...JSON.parse(JSON.stringify(orderData)), updatedAt: serverTimestamp() }, { merge: true }); 
                window.showMessage("工單已成功儲存至雲端"); 
                window.setMode('history'); 
            } catch (e) { 
                console.error("雲端存取失敗:", e);
                window.showMessage("儲存失敗，請確認資料庫安全性規則設定"); 
            }
        };

        window.deleteFromCloud = (id) => { 
            window.pendingDeleteId = id; 
            document.getElementById('custom-confirm-modal').classList.remove('hidden'); 
        };

        window.executeDelete = async () => { 
            const id = window.pendingDeleteId; 
            document.getElementById('custom-confirm-modal').classList.add('hidden'); 
            if (!id || !auth.currentUser) return; 
            try { 
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'workOrders', id)); 
                window.showMessage("工單已成功刪除"); 
            } catch (e) { 
                window.showMessage("刪除失敗"); 
            } 
        };

        window.exportExcel = () => { 
            const data = window.workOrders.filter(o => o.receiveDate && o.receiveDate.startsWith(window.currentFilterMonth)).map(o => ({ 
                "單號": o.id, 
                "日期": o.receiveDate, 
                "客戶": o.customerName, 
                "車牌": o.licensePlate, 
                "品牌": o.carBrand, 
                "接待": o.salesPerson, 
                "總額(含稅)": window.calculateOrderTotal(o) 
            })); 
            const ws = XLSX.utils.json_to_sheet(data); 
            const wb = XLSX.utils.book_new(); 
            XLSX.utils.book_append_sheet(wb, ws, "月報表"); 
            XLSX.writeFile(wb, `AS_TAIPEI_${window.currentFilterMonth}.xlsx`); 
        };

        // 開始進行身份認證並初始化
        startAuth(); 
        window.addEventListener('load', () => window.setMode('history'));
    </script>

    <header class="no-print bg-gradient-to-b from-slate-900 to-indigo-950 py-12 px-4 text-center shadow-2xl border-b border-indigo-900/40">
        <h1 class="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-100 via-slate-300 to-blue-300 tracking-tighter">AS TAIPEI</h1>
        <div id="online-status" class="text-[10px] text-slate-400 mt-3 font-bold uppercase tracking-[0.3em] italic">初始化雲端環境...</div>
    </header>

    <main id="app-container" class="max-w-6xl mx-auto px-4 py-8 md:py-14 print-container">
        <!-- 系統主要功能選單 -->
        <nav id="nav-bar" class="no-print flex flex-row justify-center gap-4 md:gap-8 mb-10 md:mb-16">
            <button onclick="window.setMode('history')" class="flex-1 md:flex-none bg-white text-slate-800 p-5 md:p-6 px-8 md:px-16 rounded-[2.5rem] font-black shadow-lg border border-slate-100 hover:bg-slate-50 text-sm md:text-lg transition-all active:scale-95 flex items-center justify-center gap-2">📋 工單總表</button>
            <button onclick="window.setMode('form', null, true)" class="flex-1 md:flex-none bg-blue-600 text-white p-5 md:p-6 px-8 md:px-16 rounded-[2.5rem] font-black shadow-2xl shadow-blue-100 hover:bg-blue-700 text-sm md:text-lg transition-all active:scale-95 flex items-center justify-center gap-2">＋ 建立新案</button>
        </nav>
        
        <!-- 各視窗顯示區塊 -->
        <section id="mode-history" class="hidden"></section>
        <section id="mode-form" class="hidden"></section>
        <section id="mode-quote" class="hidden"></section>
        <section id="mode-printPreview" class="hidden"></section>
    </main>

    <!-- 自訂刪除確認彈窗 -->
    <div id="custom-confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden p-4 no-print">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full text-center border-t-8 border-rose-500">
            <div class="text-5xl mb-6">🗑️</div>
            <h3 class="text-2xl font-black text-slate-900 mb-2">確認要刪除嗎？</h3>
            <p class="text-sm text-slate-500 mb-8">刪除後資料將無法從雲端復原。</p>
            <div class="flex gap-4">
                <button onclick="document.getElementById('custom-confirm-modal').classList.add('hidden')" class="flex-1 py-4 bg-slate-50 text-slate-500 rounded-2xl font-black">取消</button>
                <button onclick="window.executeDelete()" class="flex-1 py-4 bg-rose-500 text-white rounded-2xl font-black shadow-lg shadow-rose-200">確定刪除</button>
            </div>
        </div>
    </div>

    <!-- 自訂通知訊息元件 -->
    <div id="ui-message" class="fixed top-10 left-1/2 -translate-x-1/2 z-[200] hidden no-print w-[90%] md:w-auto">
        <div class="bg-slate-800 text-white px-10 py-5 rounded-[2.5rem] shadow-2xl font-black text-sm tracking-widest flex items-center justify-center gap-4 border border-slate-700">
            <span class="text-blue-400 text-xl">●</span><span id="ui-message-text"></span>
        </div>
    </div>
</body>
</html>
